# Paramètres pour gérer et configurer le backend Firebase App Hosting.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # Augmentez cette valeur si vous souhaitez augmenter automatiquement le nombre d'instances
  # en réponse à un trafic accru.
  maxInstances: 5
  minInstances: 0
  memory: 512Mi

env:
  - variable: NEXT_PUBLIC_BASE_URL
    value: "https://stayfloow-ultim.web.app"
